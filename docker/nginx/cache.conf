# Nginx micro-caching configuration for static assets and public templates
# Deploy this to /etc/nginx/conf.d/cache.conf

proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=resumecraft_cache:10m max_size=1g inactive=60m use_temp_path=off;

server {
    listen 80;
    server_name resumecraft.com;

    # Gzip Compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_comp_level 6;

    # Static assets (JS, CSS, Images) caching
    location ~* \.(?:css|js|webp|jpg|jpeg|gif|png|ico|svg|woff|woff2|ttf|eot)$ {
        root /usr/share/nginx/html;
        expires 1y;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Micro-caching for public API endpoints (e.g., templates)
    location /api/public/ {
        proxy_pass http://backend:5000;
        proxy_cache resumecraft_cache;
        proxy_cache_valid 200 302 10m;
        proxy_cache_valid 404 1m;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_background_update on;
        proxy_cache_lock on;
        add_header X-Proxy-Cache $upstream_cache_status;
    }

    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}
