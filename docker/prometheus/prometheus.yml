global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'resumecraft-api'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['backend:5000']
    
  - job_name: 'bullmq-exporter'
    # Scrapes BullMQ queue depths, failed jobs, active jobs
    static_configs:
      - targets: ['bullmq-exporter:9838']

  - job_name: 'node-exporter'
    # Scrapes host machine metrics (CPU, Memory)
    static_configs:
      - targets: ['node-exporter:9100']
