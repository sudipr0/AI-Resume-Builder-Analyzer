apiVersion: apps/v1
kind: Deployment
metadata:
  name: resumecraft-api
  labels:
    app: resumecraft
    tier: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: resumecraft
      tier: backend
  template:
    metadata:
      labels:
        app: resumecraft
        tier: backend
    spec:
      containers:
      - name: api
        image: gcr.io/resumecraft/backend:${GITHUB_SHA}
        ports:
        - containerPort: 5000
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 15
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 5
        envFrom:
        - secretRef:
            name: api-secrets

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: resumecraft-api-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: resumecraft-api
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
